<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Shop</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<header>
    <div class="container header-content">
      <h1>ShopHub</h1>
      <div class="cart-icon" id="cartIcon">🛒 <span class="cart-count" id="cartCount">0</span></div>
    </div>
  </header>

  <div class="container">
    <h2 style="margin: 30px 0 15px;">Our Products</h2>

    <div class="controls">
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search products...">
      </div>
      <div class="categories" id="categoriesContainer"></div>
    </div>

    <div class="products" id="productsContainer"></div>
  </div>

  <!-- Cart Sidebar -->
  <div class="overlay" id="overlay"></div>
  <div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
      <h2>Your Cart</h2>
      <span class="close-cart" id="closeCart">✕</span>
    </div>
    <div id="cartItems"></div>
    <div class="cart-total">Total: ₦<span id="cartTotal">0</span></div>
    <button class="place-order" id="placeOrderBtn">Place Order via WhatsApp</button>
  </div>

  <script>
    let products = [];
    let categories = [];
    let cart = [];

    // Load Products from JSON
    async function loadProducts() {
      try {
        const response = await fetch('products.json');
        const data = await response.json();
        
        products = data.products || [];
        categories = data.categories || ["electronics", "accessories"];

        renderCategories();
        renderProducts(products);
      } catch (error) {
        console.error("Error loading products:", error);
        document.getElementById('productsContainer').innerHTML = `<p style="text-align:center;padding:50px;color:red;">Error loading products. Check products.json file.</p>`;
      }
    }

    function renderCategories() {
      const container = document.getElementById('categoriesContainer');
      container.innerHTML = `<button class="cat-btn active" data-category="all">All</button>`;

      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'cat-btn';
        btn.dataset.category = cat;
        btn.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
        container.appendChild(btn);
      });

      document.querySelectorAll('.cat-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          filterProducts();
        });
      });
    }

    function renderProducts(filtered) {
      const container = document.getElementById('productsContainer');
      container.innerHTML = '';

      filtered.forEach(product => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
          <img src="${product.image}" alt="${product.name}">
          <div class="product-info">
            <h3>${product.name}</h3>
            <p class="price">₦${product.price.toLocaleString()}</p>
            <button class="add-to-cart" onclick="addToCart(${product.id})">Add to Cart</button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    window.addToCart = function(id) {
      const product = products.find(p => p.id === id);
      if (!product) return;

      const existing = cart.find(item => item.id === id);
      if (existing) existing.quantity++;
      else cart.push({ ...product, quantity: 1 });

      updateCart();
    };

    function updateCart() {
      const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
      document.getElementById('cartCount').textContent = totalItems;

      const container = document.getElementById('cartItems');
      container.innerHTML = '';

      if (cart.length === 0) {
        container.innerHTML = '<p style="text-align:center;padding:40px;color:#777;">Your cart is empty</p>';
        return;
      }

      cart.forEach((item, index) => {
        container.innerHTML += `
          <div class="cart-item">
            <img src="${item.image}">
            <div style="flex:1">
              <h4>${item.name}</h4>
              <p>₦${item.price.toLocaleString()}</p>
              <div>
                <button onclick="changeQuantity(${index}, -1)">−</button>
                <span>${item.quantity}</span>
                <button onclick="changeQuantity(${index}, 1)">+</button>
                <button onclick="removeFromCart(${index})" style="color:red;margin-left:10px;">Remove</button>
              </div>
            </div>
          </div>`;
      });

      const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
      document.getElementById('cartTotal').textContent = total.toLocaleString();
    }

    window.changeQuantity = function(index, change) {
      cart[index].quantity += change;
      if (cart[index].quantity < 1) cart[index].quantity = 1;
      updateCart();
    };

    window.removeFromCart = function(index) {
      cart.splice(index, 1);
      updateCart();
    };

    // ==================== WHATSAPP FUNCTION ====================
    document.getElementById('placeOrderBtn').addEventListener('click', () => {
      if (cart.length === 0) {
        alert("Your cart is empty!");
        return;
      }

      let message = "🛍️ *New Order from ShopHub*%0A─────────────────%0A%0A";
      message += `*Location:* Nigeria%0A`;
      message += `*Time:* ${new Date().toLocaleString()}%0A%0A`;
      message += "*Items:*%0A";

      let total = 0;
      cart.forEach((item, i) => {
        const subtotal = item.price * item.quantity;
        total += subtotal;
        message += `${i+1}. ${item.name} × ${item.quantity} = ₦${subtotal.toLocaleString()}%0A`;
      });

      message += `%0A*Grand Total: ₦${total.toLocaleString()}*%0A%0A`;
      message += "Please confirm my order. Thank you! 🙏";

      const phoneNumber = "2349070140698";   // ← CHANGE TO YOUR NUMBER

      window.open(`https://wa.me/${phoneNumber}?text=${message}`, '_blank');

      // Clear cart after order
      cart = [];
      updateCart();
    });

    // Search & Filter
    function filterProducts() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const active = document.querySelector('.cat-btn.active').dataset.category;

      let filtered = products;

      if (active !== "all") filtered = filtered.filter(p => p.category === active);
      if (search) filtered = filtered.filter(p => p.name.toLowerCase().includes(search));

      renderProducts(filtered);
    }

    document.getElementById('searchInput').addEventListener('input', filterProducts);

    // Cart Sidebar
    document.getElementById('cartIcon').addEventListener('click', () => {
      document.getElementById('cartSidebar').classList.add('open');
      document.getElementById('overlay').classList.add('show');
    });

    document.getElementById('closeCart').addEventListener('click', () => {
      document.getElementById('cartSidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('show');
    });

    document.getElementById('overlay').addEventListener('click', () => {
      document.getElementById('cartSidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('show');
    });

    // Start the app
    loadProducts();
  </script>
</body>
</html>
