<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <div class="container header-content">
      <h1>ShopHub</h1>
      <div class="cart-icon" id="cartIcon">
        🛒
        <span class="cart-count" id="cartCount">0</span>
      </div>
    </div>
  </header>

  <div class="container">
    <h2 style="margin: 30px 0 20px;">Our Products</h2>
    <div class="products" id="productsContainer">
      <!-- Products will be added by JavaScript -->
    </div>
  </div>

  <!-- Cart Sidebar -->
  <div class="overlay" id="overlay"></div>
  <div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
      <h2>Your Cart</h2>
      <span class="close-cart" id="closeCart">✕</span>
    </div>
    
    <div id="cartItems"></div>

    <div class="cart-total">
      Total: ₦<span id="cartTotal">0</span>
    </div>

    <button class="place-order" id="placeOrderBtn">Place Order via WhatsApp</button>
  </div>

  <script>
    // Sample Products
    const products = [
      {
        id: 1,
        name: "Wireless Headphones",
        price: 45000,
        image: "https://picsum.photos/id/60/400/300"
      },
      {
        id: 2,
        name: "Smart Watch Pro",
        price: 85000,
        image: "https://picsum.photos/id/201/400/300"
      },
      {
        id: 3,
        name: "Laptop Backpack",
        price: 25000,
        image: "https://picsum.photos/id/367/400/300"
      },
      {
        id: 4,
        name: "Power Bank 20000mAh",
        price: 18000,
        image: "https://picsum.photos/id/180/400/300"
      },
      {
        id: 5,
        name: "Bluetooth Speaker",
        price: 32000,
        image: "https://picsum.photos/id/251/400/300"
      },
      {
        id: 6,
        name: "Gaming Mouse",
        price: 15000,
        image: "https://picsum.photos/id/367/400/300"
      }
    ];

    let cart = [];

    // Render Products
    function renderProducts() {
      const container = document.getElementById('productsContainer');
      container.innerHTML = '';

      products.forEach(product => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
          <img src="${product.image}" alt="${product.name}">
          <div class="product-info">
            <h3>${product.name}</h3>
            <p class="price">₦${product.price.toLocaleString()}</p>
            <button class="add-to-cart" onclick="addToCart(${product.id})">
              Add to Cart
            </button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    // Add to Cart
    window.addToCart = function(productId) {
      const product = products.find(p => p.id === productId);
      const existingItem = cart.find(item => item.id === productId);

      if (existingItem) {
        existingItem.quantity += 1;
      } else {
        cart.push({
          ...product,
          quantity: 1
        });
      }

      updateCart();
      showNotification(`${product.name} added to cart!`);
    }

    function updateCart() {
      // Update count
      const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
      document.getElementById('cartCount').textContent = totalItems;

      // Render cart items
      const cartItemsContainer = document.getElementById('cartItems');
      cartItemsContainer.innerHTML = '';

      if (cart.length === 0) {
        cartItemsContainer.innerHTML = '<p style="text-align:center; padding:40px; color:#777;">Your cart is empty</p>';
        return;
      }

      cart.forEach((item, index) => {
        const itemHTML = `
          <div class="cart-item">
            <img src="${item.image}" alt="${item.name}">
            <div style="flex: 1;">
              <h4>${item.name}</h4>
              <p>₦${item.price.toLocaleString()}</p>
              <div class="quantity">
                <button class="qty-btn" onclick="changeQuantity(${index}, -1)">−</button>
                <span>${item.quantity}</span>
                <button class="qty-btn" onclick="changeQuantity(${index}, 1)">+</button>
                <button onclick="removeFromCart(${index})" style="margin-left: auto; color: #e74c3c; background:none; border:none; cursor:pointer;">Remove</button>
              </div>
            </div>
          </div>
        `;
        cartItemsContainer.innerHTML += itemHTML;
      });

      // Update total
      const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      document.getElementById('cartTotal').textContent = total.toLocaleString();
    }

    window.changeQuantity = function(index, change) {
      cart[index].quantity += change;
      if (cart[index].quantity < 1) cart[index].quantity = 1;
      updateCart();
    }

    window.removeFromCart = function(index) {
      cart.splice(index, 1);
      updateCart();
    }

    // Show Notification
    function showNotification(message) {
      const notification = document.createElement('div');
      notification.style.cssText = `
        position: fixed; top: 20px; right: 20px; background: #27ae60; color: white; 
        padding: 15px 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        z-index: 2000; font-weight: bold;
      `;
      notification.textContent = message;
      document.body.appendChild(notification);

      setTimeout(() => {
        notification.style.opacity = '0';
        setTimeout(() => notification.remove(), 300);
      }, 2000);
    }

    // Open & Close Cart
    const cartSidebar = document.getElementById('cartSidebar');
    const overlay = document.getElementById('overlay');
    const cartIcon = document.getElementById('cartIcon');
    const closeCart = document.getElementById('closeCart');

    cartIcon.addEventListener('click', () => {
      cartSidebar.classList.add('open');
      overlay.classList.add('show');
    });

    closeCart.addEventListener('click', () => {
      cartSidebar.classList.remove('open');
      overlay.classList.remove('show');
    });

    overlay.addEventListener('click', () => {
      cartSidebar.classList.remove('open');
      overlay.classList.remove('show');
    });

    // Place Order via WhatsApp
    document.getElementById('placeOrderBtn').addEventListener('click', () => {
      if (cart.length === 0) {
        alert("Your cart is empty!");
        return;
      }

      let message = "🛍️ *New Order from ShopHub*%0A%0A";
      message += "*Customer:* Mbagwu%0A";
      message += "*Location:* Lagos, Nigeria%0A%0A";
      message += "*Order Details:*%0A";

      let total = 0;

      cart.forEach(item => {
        const itemTotal = item.price * item.quantity;
        total += itemTotal;
        message += `• ${item.name}%0A`;
        message += `   Qty: ${item.quantity} × ₦${item.price.toLocaleString()} = ₦${itemTotal.toLocaleString()}%0A%0A`;
      });

      message += `*Total: ₦${total.toLocaleString()}*%0A%0A`;
      message += "Please confirm my order!";

      // Replace with your WhatsApp number
      const phoneNumber = "2349070140698"; // ← CHANGE THIS TO YOUR NUMBER (with country code)

      const whatsappURL = `https://wa.me/${phoneNumber}?text=${message}`;
      
      // Open WhatsApp
      window.open(whatsappURL, '_blank');

      // Optional: Clear cart after ordering
      // cart = [];
      // updateCart();
      // cartSidebar.classList.remove('open');
      // overlay.classList.remove('show');
    });

    // Initialize
    renderProducts();
  </script>
</body>
</html>
