<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Shop</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<header>
    <div class="container header-content">
      <h1>ShopHub</h1>
      <div class="cart-icon" id="cartIcon">🛒 <span class="cart-count" id="cartCount">0</span></div>
    </div>
  </header>

  <div class="container">
    <h2 style="margin: 30px 0 15px;">Our Products</h2>

    <div class="controls">
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search products...">
      </div>
      <div class="categories" id="categoriesContainer"></div>
    </div>

    <div class="products" id="productsContainer">
      <!-- Products will appear here -->
    </div>
  </div>

  <!-- Cart Sidebar -->
  <div class="overlay" id="overlay"></div>
  <div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
      <h2>Your Cart</h2>
      <span class="close-cart" id="closeCart">✕</span>
    </div>
    <div id="cartItems"></div>
    <div class="cart-total">Total: ₦<span id="cartTotal">0</span></div>
    <button class="place-order" id="placeOrderBtn">Place Order via WhatsApp</button>
  </div>

  <!-- Thank You Modal -->
  <div class="modal" id="thankYouModal">
    <h2>✅ Order Sent Successfully!</h2>
    <p>Thank you for shopping with us.<br>Your order has been sent via WhatsApp.</p>
    <button onclick="closeModal()" style="margin-top:20px;padding:12px 25px;background:#27ae60;color:white;border:none;border-radius:8px;cursor:pointer;">
      Close
    </button>
  </div>

  <script>
    let products = [];
    let cart = [];
    let categories = [];

    function loadData() {
      // Load Products
      const savedProducts = localStorage.getItem('shopProducts');
      if (savedProducts) {
        products = JSON.parse(savedProducts);
      }

      // Load Categories
      const savedCategories = localStorage.getItem('shopCategories');
      if (savedCategories) {
        categories = JSON.parse(savedCategories);
      } else {
        categories = ["electronics", "accessories"];
      }

      // If no products exist yet, show a message
      if (products.length === 0) {
        document.getElementById('productsContainer').innerHTML = 
          `<p style="grid-column:1/-1;text-align:center;padding:50px;color:#777;">
            No products yet.<br><br>
            Go to <a href="admin.html" style="color:#3498db;">Admin Panel</a> to add products.
          </p>`;
      }
    }

    function loadCart() {
      const saved = localStorage.getItem('shopCart');
      if (saved) cart = JSON.parse(saved);
    }

    function saveCart() {
      localStorage.setItem('shopCart', JSON.stringify(cart));
    }

    // Render Dynamic Categories
    function renderCategories() {
      const container = document.getElementById('categoriesContainer');
      container.innerHTML = `<button class="cat-btn active" data-category="all">All</button>`;

      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = "cat-btn";
        btn.dataset.category = cat;
        btn.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
        container.appendChild(btn);
      });

      // Add click listeners
      document.querySelectorAll('.cat-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          filterProducts();
        });
      });
    }

    function renderProducts(filtered) {
      const container = document.getElementById('productsContainer');
      container.innerHTML = '';

      if (filtered.length === 0) {
        container.innerHTML = `<p style="grid-column:1/-1;text-align:center;padding:40px;color:#777;">No products found</p>`;
        return;
      }

      filtered.forEach(product => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
          <img src="${product.image}" alt="${product.name}">
          <div class="product-info">
            <h3>${product.name}</h3>
            <p class="price">₦${product.price.toLocaleString()}</p>
            <button class="add-to-cart" onclick="addToCart(${product.id})">Add to Cart</button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    window.addToCart = function(id) {
      const product = products.find(p => p.id === id);
      if (!product) return;

      const existing = cart.find(item => item.id === id);
      if (existing) existing.quantity++;
      else cart.push({...product, quantity: 1});

      saveCart();
      updateCart();
      showNotification(`${product.name} added to cart`);
    };

    function updateCart() {
      const count = cart.reduce((a, c) => a + c.quantity, 0);
      document.getElementById('cartCount').textContent = count;

      const container = document.getElementById('cartItems');
      container.innerHTML = '';

      if (cart.length === 0) {
        container.innerHTML = '<p style="text-align:center;padding:40px;color:#777;">Cart is empty</p>';
        document.getElementById('cartTotal').textContent = '0';
        return;
      }

      cart.forEach((item, i) => {
        container.innerHTML += `
          <div class="cart-item">
            <img src="${item.image}" alt="${item.name}">
            <div style="flex:1">
              <h4>${item.name}</h4>
              <p>₦${item.price.toLocaleString()}</p>
              <div class="quantity">
                <button onclick="changeQuantity(${i}, -1)">−</button>
                <span>${item.quantity}</span>
                <button onclick="changeQuantity(${i}, 1)">+</button>
                <button onclick="removeFromCart(${i})" style="margin-left:auto;color:#e74c3c;">Remove</button>
              </div>
            </div>
          </div>`;
      });

      const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
      document.getElementById('cartTotal').textContent = total.toLocaleString();
    }

    window.changeQuantity = function(index, change) {
      cart[index].quantity += change;
      if (cart[index].quantity < 1) cart[index].quantity = 1;
      saveCart();
      updateCart();
    };

    window.removeFromCart = function(index) {
      cart.splice(index, 1);
      saveCart();
      updateCart();
    };

    function showNotification(msg) {
      const div = document.createElement('div');
      div.style.cssText = `position:fixed;top:20px;right:20px;background:#27ae60;color:white;padding:15px 25px;border-radius:8px;z-index:2000;`;
      div.textContent = msg;
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 2500);
    }

    // Filter Products
    function filterProducts() {
      const search = document.getElementById('searchInput').value.toLowerCase().trim();
      const activeCat = document.querySelector('.cat-btn.active').dataset.category;

      let filtered = products;

      if (activeCat !== "all") {
        filtered = filtered.filter(p => p.category === activeCat);
      }
      if (search) {
        filtered = filtered.filter(p => p.name.toLowerCase().includes(search));
      }

      renderProducts(filtered);
    }

    // WhatsApp Order
    document.getElementById('placeOrderBtn').addEventListener('click', () => {
      if (cart.length === 0) return alert("Cart is empty!");

      let msg = "🛍️ *New Order from ShopHub*%0A─────────────────%0A%0A";
      msg += `*Location:* Nigeria%0A`;
      msg += `*Time:* ${new Date().toLocaleString()}%0A%0A*Items:*%0A`;

      let total = 0;
      cart.forEach((item, i) => {
        const subtotal = item.price * item.quantity;
        total += subtotal;
        msg += `${i+1}. ${item.name} × ${item.quantity} = ₦${subtotal.toLocaleString()}%0A`;
      });

      msg += `%0A*Total: ₦${total.toLocaleString()}*%0A%0APlease confirm my order.`;

      const phone = "2349070140698";   // ← CHANGE THIS TO YOUR NUMBER
      window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');

      cart = [];
      saveCart();
      updateCart();

      document.getElementById('thankYouModal').classList.add('show');
      document.getElementById('cartSidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('show');
    });

    function closeModal() {
      document.getElementById('thankYouModal').classList.remove('show');
    }

    // Cart Sidebar Controls
    document.getElementById('cartIcon').addEventListener('click', () => {
      document.getElementById('cartSidebar').classList.add('open');
      document.getElementById('overlay').classList.add('show');
    });

    document.getElementById('closeCart').addEventListener('click', () => {
      document.getElementById('cartSidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('show');
    });

    document.getElementById('overlay').addEventListener('click', () => {
      document.getElementById('cartSidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('show');
    });

    document.getElementById('searchInput').addEventListener('input', filterProducts);

    // Initialize
    loadData();
    loadCart();
    renderCategories();
    renderProducts(products);
    updateCart();
  </script>
</body>
</html>
