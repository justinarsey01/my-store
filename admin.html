<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin-panel</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

 <!-- Login -->
  <div id="loginScreen">
    <div class="login-container">
      <h1>🔐 Admin Login</h1>
      <input type="text" id="username" placeholder="Username" value="admin"><br><br>
      <input type="password" id="password" placeholder="Password" value="123456"><br><br>
      <button onclick="login()" class="btn-primary" style="width:100%;padding:14px;">Login</button>
      <p style="margin-top:15px; color:#777;">Default: admin / 123456</p>
    </div>
  </div>

  <!-- Admin Panel -->
  <div id="adminPanel" class="hidden">
    <header><h1>🛠️ ShopHub Admin Panel</h1></header>
    
    <div class="container">
      <a href="index.html" style="color:#3498db;">← Back to Store</a>

      <div class="admin-panel">
        <!-- Form -->
        <div class="card">
          <h2 id="formTitle">Add New Product</h2>
          <form id="productForm">
            <input type="hidden" id="editIndex">

            <div class="form-group">
              <label>Product Name</label>
              <input type="text" id="name" required>
            </div>
            <div class="form-group">
              <label>Price (₦)</label>
              <input type="number" id="price" required>
            </div>
            <div class="form-group">
              <label>Image</label>
              <div class="image-upload-area" id="uploadArea">Click to upload image</div>
              <input type="file" id="imageInput" accept="image/*" hidden>
              <img id="imagePreview" class="image-preview">
            </div>
            <div class="form-group">
              <label>Category</label>
              <select id="category" required></select>
            </div>
            <button type="submit" class="btn-primary" id="submitBtn">Add Product</button>
          </form>
        </div>

        <!-- Products List -->
        <div class="card">
          <h2>All Products (<span id="productCount">0</span>)</h2>
          <table>
            <thead>
              <tr>
                <th>Image</th>
                <th>Name</th>
                <th>Price</th>
                <th>Category</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>

          <hr style="margin:20px 0">
          <h3>Copy Updated JSON</h3>
          <textarea id="jsonOutput" rows="12" style="width:100%; font-family:monospace;"></textarea>
          <button onclick="copyJSON()" class="btn-success">Copy JSON</button>
        </div>
      </div>
    </div>
  </div>

  <div class="notification" id="notification"></div>

  <script>
    const ADMIN_USERNAME = "admin";
    const ADMIN_PASSWORD = "123456";

    let products = [];
    let categories = [];
    let currentImage = "";

    function login() {
      if (document.getElementById('username').value === ADMIN_USERNAME && 
          document.getElementById('password').value === ADMIN_PASSWORD) {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('adminPanel').classList.remove('hidden');
        loadData();
      } else {
        showNotification("Wrong username or password", "red");
      }
    }

    async function loadData() {
      try {
        const res = await fetch('products.json');
        const data = await res.json();
        products = data.products || [];
        categories = data.categories || ["electronics", "accessories"];
        renderTable();
        renderCategorySelect();
        updateJSONOutput();
      } catch (e) {
        showNotification("Failed to load products.json", "red");
      }
    }

    function renderCategorySelect() {
      const select = document.getElementById('category');
      select.innerHTML = "";
      categories.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat;
        opt.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
        select.appendChild(opt);
      });
    }

    function renderTable() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';
      document.getElementById('productCount').textContent = products.length;

      products.forEach((product, index) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td><img src="${product.image}" style="width:60px;height:60px;object-fit:cover;border-radius:6px;"></td>
          <td>${product.name}</td>
          <td>₦${product.price.toLocaleString()}</td>
          <td>${product.category}</td>
          <td>
            <button onclick="editProduct(${index})" style="background:#f39c12;color:white;margin-right:5px;">Edit</button>
            <button onclick="deleteProduct(${index})" style="background:#e74c3c;color:white;">Delete</button>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    // Image Upload
    document.getElementById('uploadArea').addEventListener('click', () => document.getElementById('imageInput').click());
    document.getElementById('imageInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        currentImage = ev.target.result;
        document.getElementById('imagePreview').src = currentImage;
        document.getElementById('imagePreview').style.display = 'block';
      };
      reader.readAsDataURL(file);
    });

    // Form Submit
    document.getElementById('productForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const price = parseInt(document.getElementById('price').value);
      const category = document.getElementById('category').value;
      const editIndex = document.getElementById('editIndex').value;

      if (!name || !price || !category) return showNotification("Please fill all fields", "red");

      const productData = {
        id: Date.now(),
        name: name,
        price: price,
        image: currentImage || "https://picsum.photos/id/60/400/300",
        category: category
      };

      if (editIndex !== "") {
        products[editIndex] = productData;
        showNotification("Product updated successfully!", "green");
      } else {
        products.push(productData);
        showNotification("Product added successfully!", "green");
      }

      updateJSONOutput();
      renderTable();
      resetForm();
    });

    function resetForm() {
      document.getElementById('productForm').reset();
      document.getElementById('imagePreview').style.display = 'none';
      document.getElementById('editIndex').value = "";
      currentImage = "";
      document.getElementById('formTitle').textContent = "Add New Product";
    }

    window.editProduct = function(index) {
      const p = products[index];
      document.getElementById('editIndex').value = index;
      document.getElementById('name').value = p.name;
      document.getElementById('price').value = p.price;
      document.getElementById('category').value = p.category;
      
      document.getElementById('imagePreview').src = p.image;
      document.getElementById('imagePreview').style.display = 'block';
      currentImage = p.image;

      document.getElementById('formTitle').textContent = "Edit Product";
    };

    window.deleteProduct = function(index) {
      if (confirm("Are you sure you want to delete this product?")) {
        products.splice(index, 1);
        updateJSONOutput();
        renderTable();
        showNotification("Product deleted", "red");
      }
    };

    function updateJSONOutput() {
      const data = { products: products, categories: categories };
      document.getElementById('jsonOutput').value = JSON.stringify(data, null, 2);
    }

    function copyJSON() {
      navigator.clipboard.writeText(document.getElementById('jsonOutput').value);
      showNotification("JSON copied! Paste into products.json", "green");
    }

    function showNotification(msg, color) {
      const n = document.getElementById('notification');
      n.textContent = msg;
      n.style.background = color;
      n.style.display = 'block';
      setTimeout(() => n.style.display = 'none', 3000);
    }

    // Login with Enter key
    document.getElementById('password').addEventListener('keypress', e => { if(e.key === "Enter") login(); });
  </script>
</body>
</html>
