<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin-panel</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

 <!-- Login Screen -->
  <div id="loginScreen">
    <div class="login-container">
      <h1>🔐 Admin Login</h1>
      <p style="margin:15px 0 25px; color:#555;">ShopHub Management</p>
      
      <input type="text" id="username" placeholder="Username" value="admin"><br>
      <input type="password" id="password" placeholder="Password"><br><br>
      
      <button onclick="login()" class="btn-primary" style="width:100%; padding:14px;">Login</button>
      <p style="margin-top:20px; font-size:0.9rem; color:#777;">
        Default: <strong>admin</strong> / <strong>123456</strong>
      </p>
    </div>
  </div>

  <!-- Main Admin Panel (Hidden by default) -->
  <div id="adminPanel" class="hidden">
    <h1>🛠️ ShopHub Admin Panel </h1>
    
    <div class="container">
      <a href="index.html" style="color:#3498db;">← Back to Store</a>

      <div class="admin-panel">
        <!-- Add Product Form -->
        <div class="card">
          <h2 id="formTitle">Add New Product</h2>
          <form id="productForm">
            <input type="hidden" id="editId">
            <div class="form-group">
              <label>Product Name</label>
              <input type="text" id="name" required>
            </div>
            <div class="form-group">
              <label>Price (₦)</label>
              <input type="number" id="price" required>
            </div>
            <div class="form-group">
              <label>Image</label>
              <div class="image-upload-area" id="uploadArea" style="border:2px dashed #3498db;padding:20px;text-align:center;cursor:pointer;">
                Click to upload image
                <input type="file" id="imageInput" accept="image/*" hidden>
              </div>
              <img id="imagePreview" style="max-width:200px;margin:10px auto;display:none;border-radius:8px;">
            </div>
            <div class="form-group">
              <label>Category</label>
              <select id="category" required></select>
            </div>
            <button type="submit" class="btn-primary" id="submitBtn">Add Product</button>
          </form>
        </div>

        <!-- Products + JSON -->
        <div class="card">
          <h2>All Products (<span id="productCount">0</span>)</h2>
          <table style="width:100%; border-collapse:collapse;">
            <thead>
              <tr><th>Image</th><th>Name</th><th>Price</th><th>Category</th><th>Actions</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>

          <hr style="margin:20px 0">
          <h3>Copy Updated JSON</h3>
          <textarea id="jsonOutput" rows="10" style="width:100%;font-family:monospace;"></textarea>
          <button onclick="copyJSON()" class="btn-success" style="margin-top:10px;">Copy JSON</button>
        </div>
      </div>
    </div>
  </div>

  <div class="notification" id="notification"></div>

  <script>
    // ==================== LOGIN CREDENTIALS ====================
    const ADMIN_USERNAME = "admin";
    const ADMIN_PASSWORD = "123456";   // Change this to something secure

    let products = [];
    let categories = [];
    let currentImage = "";

    function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('adminPanel').classList.remove('hidden');
        loadData();
      } else {
        showNotification("Incorrect username or password", "red");
      }
    }

    async function loadData() {
      try {
        const res = await fetch('products.json');
        const data = await res.json();
        products = data.products || [];
        categories = data.categories || ["electronics", "accessories"];
        renderTable();
        renderCategorySelect();
        updateJSONOutput();
      } catch (e) {
        showNotification("Could not load products.json", "red");
      }
    }

    // Rest of the functions (same as previous version)
    function renderCategorySelect() {
      const select = document.getElementById('category');
      select.innerHTML = '';
      categories.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat;
        opt.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
        select.appendChild(opt);
      });
    }

    function renderTable() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';
      document.getElementById('productCount').textContent = products.length;

      products.forEach((p, i) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td><img src="${p.image}" style="width:50px;height:50px;object-fit:cover;border-radius:4px;"></td>
          <td>${p.name}</td>
          <td>₦${p.price.toLocaleString()}</td>
          <td>${p.category}</td>
          <td>
            <button onclick="editProduct(${i})" style="background:#f39c12;color:white;padding:4px 8px;">Edit</button>
            <button onclick="deleteProduct(${i})" style="background:#e74c3c;color:white;padding:4px 8px;">Delete</button>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    // Image Upload
    document.getElementById('uploadArea').addEventListener('click', () => document.getElementById('imageInput').click());

    document.getElementById('imageInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        currentImage = ev.target.result;
        document.getElementById('imagePreview').src = currentImage;
        document.getElementById('imagePreview').style.display = 'block';
      };
      reader.readAsDataURL(file);
    });

    // Form Submit
    document.getElementById('productForm').addEventListener('submit', (e) => {
      e.preventDefault();
      // ... (same logic as before - I kept it short)
      const name = document.getElementById('name').value.trim();
      const price = parseInt(document.getElementById('price').value);
      const category = document.getElementById('category').value;

      if (!name || !price || !category) return showNotification("Fill all fields", "red");

      const newProduct = {
        id: Date.now(),
        name, price, category,
        image: currentImage || "https://picsum.photos/id/60/400/300"
      };

      const editId = document.getElementById('editId').value;
      if (editId) {
        const index = products.findIndex(p => p.id == editId);
        if (index !== -1) products[index] = newProduct;
      } else {
        products.push(newProduct);
      }

      updateJSONOutput();
      renderTable();
      resetForm();
      showNotification(editId ? "Product updated!" : "Product added successfully!", "green");
    });

    function resetForm() {
      document.getElementById('productForm').reset();
      document.getElementById('imagePreview').style.display = 'none';
      currentImage = "";
    }

    window.editProduct = function(index) { /* same as before */ };
    window.deleteProduct = function(index) { /* same as before */ };

    function updateJSONOutput() {
      const data = { products, categories };
      document.getElementById('jsonOutput').value = JSON.stringify(data, null, 2);
    }

    function copyJSON() {
      navigator.clipboard.writeText(document.getElementById('jsonOutput').value);
      showNotification("JSON copied to clipboard!", "green");
    }

    function showNotification(msg, color) {
      const n = document.getElementById('notification');
      n.textContent = msg;
      n.style.background = color;
      n.style.display = 'block';
      setTimeout(() => n.style.display = 'none', 3000);
    }

    // Allow Enter key on password
    document.getElementById('password').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
